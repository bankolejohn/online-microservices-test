# Kind multi-node cluster configuration
# 1 control-plane + 3 worker nodes
# Disables default CNI so we can install Calico (for NetworkPolicy support)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: shopping-cluster
networking:
  # Disable default CNI (kindnet) — we'll install Calico instead
  # Calico supports NetworkPolicies, kindnet does not
  disableDefaultCNI: true
  # Pod subnet for Calico
  podSubnet: "192.168.0.0/16"
nodes:
  # Control plane node — runs etcd, API server, scheduler, controller-manager
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraConfig:
            nodeStatusUpdateFrequency: 10s
    # Map port 80 on host to the ingress controller (for later use)
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
  # Worker node 1 — runs application pods
  - role: worker
  # Worker node 2 — runs application pods
  - role: worker
  # Worker node 3 — runs application pods (for scheduling experiments)
  - role: worker
