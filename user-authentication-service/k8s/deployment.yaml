apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-authentication-service
  labels:
    app: user-authentication-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-authentication-service
  template:
    metadata:
      labels:
        app: user-authentication-service
    spec:
      containers:
      - name: user-authentication-service
        image: user-authentication-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: JWT_SECRET
          value: "your-jwt-secret-key-change-in-production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5