# Custom values for Loki (log aggregation)
# Loki collects logs from all pods via Promtail (agent on each node)

# Single-binary mode (suitable for dev/small clusters)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Disable components not needed in single-binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable gateway in single-binary mode
gateway:
  enabled: false

# Disable minio (we use filesystem)
minio:
  enabled: false

# Chunksache and results cache
chunksCache:
  enabled: false
resultsCache:
  enabled: false
