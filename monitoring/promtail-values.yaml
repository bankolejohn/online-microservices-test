# Promtail configuration
# Promtail is the log shipping agent — it runs on every node
# and ships container logs to Loki

config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push

# Resources for the Promtail DaemonSet
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
