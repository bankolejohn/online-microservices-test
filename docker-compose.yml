version: '3.8'

services:
  # Frontend Service (React app served by nginx, which also proxies /api/* to backends)
  frontend-service:
    build: ./frontend-service
    ports:
      - "3000:80"
    depends_on:
      - product-catalog-service
      - cart-service
      - user-authentication-service
      - checkout-service
    networks:
      - microservices

  # Product Catalog Service
  product-catalog-service:
    build: ./product-catalog-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    networks:
      - microservices

  # Cart Service
  cart-service:
    build: ./cart-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    networks:
      - microservices

  # User Authentication Service
  user-authentication-service:
    build: ./user-authentication-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    networks:
      - microservices

  # Checkout Service
  checkout-service:
    build: ./checkout-service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - CART_SERVICE_URL=http://cart-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:5002
      - SHIPPING_SERVICE_URL=http://shipping-service:8080
    depends_on:
      - payment-service
      - shipping-service
      - cart-service
    networks:
      - microservices

  # Payment Service
  payment-service:
    build: ./payment-service
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=production
    networks:
      - microservices

  # Shipping Service
  shipping-service:
    build: ./shipping-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
