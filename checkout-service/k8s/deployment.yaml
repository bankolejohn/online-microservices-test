apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  labels:
    app: checkout-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
    spec:
      containers:
      - name: checkout-service
        image: checkout-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        - name: CART_SERVICE_URL
          value: "http://cart-service:3002"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:5002"
        - name: SHIPPING_SERVICE_URL
          value: "http://shipping-service:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5