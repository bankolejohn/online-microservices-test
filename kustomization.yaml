apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources will be created in this namespace
namespace: shopping

resources:
  # Namespace (must be first)
  - k8s/namespace.yaml

  # ConfigMaps and Secrets
  - k8s/configmap.yaml
  - k8s/secrets.yaml

  # Frontend
  - frontend-service/k8s/deployment.yaml
  - frontend-service/k8s/service.yaml

  # Product Catalog
  - product-catalog-service/k8s/deployment.yaml
  - product-catalog-service/k8s/service.yaml

  # Cart
  - cart-service/k8s/deployment.yaml
  - cart-service/k8s/service.yaml

  # User Authentication
  - user-authentication-service/k8s/deployment.yaml
  - user-authentication-service/k8s/service.yaml

  # Checkout
  - checkout-service/k8s/deployment.yaml
  - checkout-service/k8s/service.yaml

  # Payment
  - payment-service/k8s/deployment.yaml
  - payment-service/k8s/service.yaml

  # Shipping
  - shipping-service/k8s/deployment.yaml
  - shipping-service/k8s/service.yaml

  # Ingress
  - ingress.yaml
